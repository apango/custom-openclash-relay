; ========== 代理组配置 ==========

; 【核心】节点选择 - 包含链式代理选项（与地区节点平级）
custom_proxy_group=🚀 节点选择`select`[]🔗 链式代理`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇼🇸 台湾节点`[]🇰🇷 韩国节点`[]🎯 全球直连

