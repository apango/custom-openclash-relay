; ============================================================
; Custom_Clash_Relay.ini - 链式代理出口版本
; 流量路径: 用户 → 策略组 → 🚀 手动选择 → 🔗 链式代理 → 上游节点 → 美国私宅 → 目标网站
; 网站看到: 美国私宅 IP
; 上游: https://github.com/Aethersailor/Custom_OpenClash_Rules
;
; 使用说明:
; 1. 在 OpenClash 订阅配置中使用此 ini 作为订阅模板
; 2. 在本地配置中添加 🏠 美国私宅 代理定义和 relay 组
; ============================================================

[custom]

