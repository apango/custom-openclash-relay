; ========== 代理组配置 ==========

; 【核心】🚀 手动选择 - 主选择入口
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🔗 链式代理`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇼🇸 台湾节点`[]🇰🇷 韩国节点`[]🎯 全球直连

; 🔗 链式代理 - 选择上游来源（通过哪个机场节点连接美国私宅）
custom_proxy_group=🔗 链式代理`select`[]🇭🇰 香港`[]🇺🇸 美国`[]🇯🇵 日本`[]🇸🇬 新加坡`[]🇼🇸 台湾`[]🇰🇷 韩国

; 【新增】各地区链式代理 - relay[美国私宅, 机场节点]
; 注意：relay 中第一个是最终出口，第二个是第一跳
custom_proxy_group=🇭🇰 香港`relay`[]🏠 美国私宅`[]🇭🇰 香港节点
custom_proxy_group=🇺🇸 美国`relay`[]🏠 美国私宅`[]🇺🇸 美国节点
custom_proxy_group=🇯🇵 日本`relay`[]🏠 美国私宅`[]🇯🇵 日本节点
custom_proxy_group=🇸🇬 新加坡`relay`[]🏠 美国私宅`[]🇸🇬 新加坡节点
custom_proxy_group=🇼🇸 台湾`relay`[]🏠 美国私宅`[]🇼🇸 台湾节点
custom_proxy_group=🇰🇷 韩国`relay`[]🏠 美国私宅`[]🇰🇷 韩国节点

; 🚀 节点选择（兼容原配置）
