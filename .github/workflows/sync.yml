name: Sync Upstream Rules

on:
  schedule:
    # 每天 UTC 00:00 自动执行（北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发
  push:                # 推送时也执行（用于首次设置）

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch upstream INI
        run: |
          curl -sL "https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/main/cfg/Custom_Clash.ini" \
            -o upstream.ini

      - name: Check if upstream changed
        id: check
        run: |
          if [ -f upstream.ini ] && [ -s upstream.ini ]; then
            echo "upstream_changed=true" >> $GITHUB_OUTPUT
            echo "::notice::检测到上游配置，准备同步..."
          else
            echo "::error::无法获取上游配置"
            exit 1
          fi

      - name: Parse upstream rules
        if: steps.check.outputs.upstream_changed == 'true'
        run: |
          # 提取规则集
          grep "^ruleset=" upstream.ini > rules_from_upstream.txt

          # 提取代理组（排除我们的自定义组）
          grep "^custom_proxy_group=" upstream.ini | \
            grep -v "🔗 链式代理\|🏠 私宅代理\|✈️ 机场节点" > groups_from_upstream.txt

          echo "从上游提取了 $(wc -l < rules_from_upstream.txt) 条规则"
          echo "从上游提取了 $(wc -l < groups_from_upstream.txt) 条代理组"

      - name: Build new INI
        if: steps.check.outputs.upstream_changed == 'true'
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          cat > cfg/Custom_Clash_Relay.ini << 'HEADER'
; ============================================================
; Custom_Clash_Relay.ini - 链式代理出口版本
; 流量路径: 设备 → 机场节点 → 私宅IP(最终出口)
; 上游: https://github.com/Aethersailor/Custom_OpenClash_Rules
; 同步地址: https://github.com/Aethersailor/Custom_OpenClash_Rules/blob/main/cfg/Custom_Clash.ini
;
; 使用说明:
; 1. 将此文件上传到你的 GitHub 仓库
; 2. 在 OpenClash 订阅配置中使用此 ini 作为订阅模板
; 3. 在"覆写配置"中填入本地私宅代理配置（见 overlay-example.yaml）
; ============================================================

[custom]

; ========== 规则配置（与上游保持一致）==========
HEADER

          # 追加上游规则
          cat rules_from_upstream.txt >> cfg/Custom_Clash_Relay.ini

          # 添加自定义代理组
          cat >> cfg/Custom_Clash_Relay.ini << 'GROUPS'

; ========== 代理组配置（所有流量走链式代理）==========

; 【核心】链式代理 - relay[第一跳, 第二跳]
; 流量走向: 你 → 机场节点 → 私宅代理(最终出口IP)
; 说明: relay[] 中第一个是第二跳(最终出口)，第二个是第一跳(入口)
custom_proxy_group=🔗 链式代理`relay`[]🏠 私宅代理`[]✈️ 机场节点

; 机场节点选择（第一跳，从订阅中筛选）
custom_proxy_group=✈️ 机场节点`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇼🇸 台湾节点`[]🇰🇷 韩国节点`.*

; 私宅代理占位（实际定义通过覆写配置注入）
custom_proxy_group=🏠 私宅代理`select`[]✈️ 机场节点

; 各功能分组 - 全部指向链式代理
custom_proxy_group=🚀 节点选择`select`[]🔗 链式代理`[]🎯 全球直连
custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=💬 即时通讯`select`[]🔗 链式代理`[]🎯 全球直连
custom_proxy_group=🌐 社交媒体`select`[]🔗 链式代理`[]🎯 全球直连
custom_proxy_group=🚀 GitHub`select`[]🔗 链式代理`[]🎯 全球直连
custom_proxy_group=🤖 ChatGPT`select`[]🔗 链式代理`.*
custom_proxy_group=🤖 AI服务`select`[]🔗 链式代理`.*
custom_proxy_group=🎶 TikTok`select`[]🔗 链式代理`.*
custom_proxy_group=📹 YouTube`select`[]🔗 链式代理`.*
custom_proxy_group=🎥 Netflix`select`[]🔗 链式代理`.*
custom_proxy_group=🎥 DisneyPlus`select`[]🔗 链式代理`.*
custom_proxy_group=🎥 HBO`select`[]🔗 链式代理`.*
custom_proxy_group=🎥 PrimeVideo`select`[]🔗 链式代理`.*
custom_proxy_group=🎥 AppleTV+`select`[]🔗 链式代理`[]🎯 全球直连`.*
custom_proxy_group=🎥 Emby`select`[]🔗 链式代理`[]🎯 全球直连`.*
custom_proxy_group=🎻 Spotify`select`[]🔗 链式代理`[]🎯 全球直连`.*
custom_proxy_group=📺 Bahamut`select`[]🔗 链式代理`[]🎯 全球直连`.*
custom_proxy_group=🌎 国外媒体`select`[]🔗 链式代理`.*
custom_proxy_group=🛒 国外电商`select`[]🔗 链式代理`[]🎯 全球直连`.*
custom_proxy_group=📢 谷歌FCM`select`[]🔗 链式代理
custom_proxy_group=🇬 谷歌服务`select`[]🔗 链式代理`.*
custom_proxy_group=🍎 苹果服务`select`[]🎯 全球直连`[]🔗 链式代理`.*
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]🔗 链式代理`.*
custom_proxy_group=🎮 游戏平台`select`[]🎯 全球直连`[]🔗 链式代理`.*
custom_proxy_group=🎮 Steam`select`[]🎯 全球直连`[]🔗 链式代理`.*
custom_proxy_group=🚀 测速工具`select`[]🎯 全球直连`[]🔗 链式代理`.*
custom_proxy_group=🐟 漏网之鱼`select`[]🔗 链式代理`[]🎯 全球直连`.*
custom_proxy_group=🔀 非标端口`select`[]🐟 漏网之鱼`[]🎯 全球直连
GROUPS

          # 添加地区分组
          cat groups_from_upstream.txt >> cfg/Custom_Clash_Relay.ini

          # 添加底部固定配置
          cat >> cfg/Custom_Clash_Relay.ini << 'FOOTER'

; 地区分组
custom_proxy_group=🇭🇰 香港节点`url-test`(🇭🇰|港|HK|Hong Kong)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(🇺🇸|美|US|United States)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(🇯🇵|日本|JP|Japan)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`(🇸🇬|新加坡|SG|Singapore)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇼🇸 台湾节点`url-test`(🇹🇼|🇼🇸|台|TW|Taiwan)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇰🇷 韩国节点`url-test`(🇰🇷|韩|KR|Korea)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🎯 全球直连`select`[]DIRECT

; 下方参数请勿修改
enable_rule_generator=true
overwrite_original_rules=true
FOOTER

      - name: Show diff
        run: |
          if [ -f cfg/Custom_Clash_Relay.ini ]; then
            git diff --stat cfg/Custom_Clash_Relay.ini || true
          fi

      - name: Create PR with changes
        if: steps.check.outputs.upstream_changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'sync: 自动同步上游规则'
          title: 'Sync: 同步上游 Custom_Clash.ini 更新'
          body: |
            ## 自动同步

            已从上游 [Custom_OpenClash_Rules](https://github.com/Aethersailor/Custom_OpenClash_Rules) 同步最新规则。

            ### 同步内容
            - 规则集更新
            - 保持链式代理配置不变

            ---
            *由 GitHub Actions 自动生成*
          branch: sync/upstream
          delete-branch: true
          labels: automated
