name: Sync Upstream Rules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch upstream INI
        run: |
          curl -sL "https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/main/cfg/Custom_Clash.ini" -o upstream.ini
          if [ ! -s upstream.ini ]; then
            echo "::error::无法获取上游配置"
            exit 1
          fi

      - name: Parse upstream rules
        run: |
          grep "^ruleset=" upstream.ini > rules_from_upstream.txt
          grep "^custom_proxy_group=" upstream.ini | grep -v "🔗 链式代理\|🏠 私宅代理\|✈️ 机场节点" > groups_from_upstream.txt

      - name: Build new INI
        run: python3 sync.py

      - name: Check changes
        id: changes
        run: |
          if git diff --stat cfg/Custom_Clash_Relay.ini 2>/dev/null | grep -q '|'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "检测到配置更新"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "配置无变化"
          fi

      - name: Create PR with changes
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'sync: 自动同步上游规则'
          title: 'Sync: 同步上游 Custom_Clash.ini 更新'
          body: |
            ## 自动同步

            已从上游 Custom_OpenClash_Rules 同步最新规则。

            ### 同步内容
            - 规则集更新
            - 保持链式代理配置不变

            ---
            *由 GitHub Actions 自动生成*
          branch: sync/upstream
          delete-branch: true
          labels: automated
